<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <link rel="canonical" href="{{ page.canonical }}">

  <meta property="og:locale" content="es_PE">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:url" content="{{ page.canonical }}">
  <meta property="og:site_name" content="Lightman Perú">
  <meta property="og:image" content="{{ '/assets/img/og-lightman.jpg' | absolute_url }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ page.description }}">
  <meta name="twitter:image" content="{{ '/assets/img/og-lightman.jpg' | absolute_url }}">

  <link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Lightman Perú",
    "url": "https://lightmanperu.com",
    "logo": "https://lightmanperu.com/assets/img/logo-lightman.png",
    "sameAs": [
      "https://www.instagram.com/",
      "https://www.facebook.com/"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+51-964-111-591",
      "contactType": "sales",
      "areaServed": "PE"
    }
  }
  </script>
</head>
<body class="{{ page.body_class }}">
  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
