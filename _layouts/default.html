<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <link rel="canonical" href="{{ page.canonical }}">

  <meta property="og:locale" content="es_PE">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:url" content="{{ page.canonical }}">
  <meta property="og:site_name" content="Lightman Perú">
  <meta property="og:image" content="{{ '/assets/img/og-lightman.jpg' | absolute_url }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ page.description }}">
  <meta name="twitter:image" content="{{ '/assets/img/og-lightman.jpg' | absolute_url }}">

  <!-- Favicon principal (Google lo prioriza) -->
<link rel="icon" href="/favicon.ico" sizes="any">

<!-- PNGs adicionales (mejor compatibilidad) -->
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/img/favicon.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/img/favicon.png' | relative_url }}">

<!-- Para iPhone / iOS -->
<link rel="apple-touch-icon" href="{{ '/assets/img/favicon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Lightman Perú",
    "url": "https://lightmanperu.com",
    "logo": "https://lightmanperu.com/assets/img/logo-lightman.png",
    "sameAs": [
      "https://www.instagram.com/",
      "https://www.facebook.com/"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+51-964-111-591",
      "contactType": "sales",
      "areaServed": "PE"
    }
  }
  </script>
</head>
<body class="{{ page.body_class }}">
  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}
  <div class="global-gallery" id="globalGallery" aria-hidden="true">
  <button class="gallery-close" type="button" aria-label="Cerrar galería">×</button>

  <button class="gallery-arrow gallery-prev" type="button" aria-label="Imagen anterior">‹</button>

  <div class="gallery-box">
    <img id="galleryImage" src="" alt="">
    <div class="gallery-caption">
      <h3 id="galleryTitle"></h3>
      <p id="galleryText"></p>
    </div>
  </div>

  <button class="gallery-arrow gallery-next" type="button" aria-label="Imagen siguiente">›</button>
</div>

<script src="{{ '/assets/js/gallery.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
